name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      # The integration tests record and replay against the demo app, so its
      # dependencies are part of the test fixture rather than optional extras.
      - run: npm ci --prefix examples/demo-app

      - run: npx playwright install --with-deps chromium

      - run: npm run typecheck

      - run: npm test
